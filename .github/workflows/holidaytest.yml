name: CI Tests for Gov UK Calculate Holiday Entitlement
on:
  push:
    paths:
      - 'holiday-entitlement-test/**'
  pull_request:
    paths:
      - 'holiday-entitlement-test/**'
jobs:
  test:
    name: Holiday Entitlement UI tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./holiday-entitlement-test
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Setup Node.js  
      uses: actions/setup-node@v4
      with:
        node-version: '24'
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Chromium Browser
      run: npx playwright install --with-deps chromium
    - name: Run UI tests 
      run: npx playwright test --grep regression
    - name: list directory
      run: ls -R  
    - name: Upload Playwright HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: holiday-entitlement-playwright-report
        path: holiday-entitlement-test/playwright-report
        retention-days: 30
